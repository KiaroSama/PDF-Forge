name: CI

# Run the test suite and the quality gates on every push and pull request to
# main, and on demand.
on:
  push:
    branches: [main, 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege: these jobs only need to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Repository must be clean after the suite
        shell: bash
        run: |
          # A test that writes into the checkout would show up here.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::The test suite modified the checkout:"
            git status --porcelain
            exit 1
          fi

  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: python -m ruff check pdf_forge tests
      - name: Mypy
        run: python -m mypy

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        # The threshold lives in pyproject.toml [tool.coverage.report].
        run: python -m pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  security:
    name: Dependency and secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # secret scanning needs history
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt pip-audit
      - name: Dependency vulnerability audit
        run: python -m pip_audit --strict --progress-spinner off
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  powershell:
    name: PowerShell analysis
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error `
            -ExcludeRule PSAvoidUsingWriteHost
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer reported $($results.Count) error(s)."
          }
          Write-Host 'PSScriptAnalyzer: no errors.'
